name: Merge & Update Rules

on:
  schedule:
    - cron: "1 21,2,7,12,16 * * *"
  workflow_dispatch:
  push:
    paths:
      - sources.yaml
      - merge.py

permissions:
  contents: write
  pages: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Run merger
        run: python merge.py

      - name: Stats
        run: |
          BLOCK=$(python3 -c "import json; print(json.load(open('stats.json'))['blocklist']['total'])")
          WHITE=$(python3 -c "import json; print(json.load(open('stats.json'))['whitelist']['total'])")
          echo "BLOCK_COUNT=$BLOCK" >> "$GITHUB_ENV"
          echo "WHITE_COUNT=$WHITE" >> "$GITHUB_ENV"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          exclude_assets: ".github,merge.py,sources.yaml,__pycache__,.nojekyll"

      - name: Commit stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "stats: ${BLOCK_COUNT} block / ${WHITE_COUNT} whitelist"
          file_pattern: stats.json
