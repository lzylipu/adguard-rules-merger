name: 🔄 Merge & Update Rules

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:
  push:
    paths:
      - sources.yaml
      - merge.py

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    outputs:
      block_count: ${{ steps.stats.outputs.block_count }}
      white_count: ${{ steps.stats.outputs.white_count }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install deps
        run: pip install pyyaml

      - name: 🔄 Run merger
        run: python merge.py

      - name: 📊 Generate stats
        id: stats
        run: |
          BLOCK=$(python3 -c "import json; print(json.load(open('stats.json'))['blocklist']['total'])")
          WHITE=$(python3 -c "import json; print(json.load(open('stats.json'))['whitelist']['total'])")
          echo "block_count=$BLOCK" >> "$GITHUB_OUTPUT"
          echo "white_count=$WHITE" >> "$GITHUB_OUTPUT"

      - name: 📤 Setup Pages
        uses: actions/configure-pages@v5

      - name: 🏠 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            blocklist.txt
            whitelist.txt
            stats.json

  deploy:
    needs: merge
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
