name: 🔄 Merge & Update Rules

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:
  push:
    paths:
      - sources.yaml
      - merge.py

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install deps
        run: pip install pyyaml

      - name: 🔄 Run merger
        run: python merge.py

      - name: 📊 Generate stats
        run: |
          RULES=$(python3 -c "import json; d=json.load(open('stats.json')); print(d['blocklist']['total'])")
          WL=$(python3 -c "import json; d=json.load(open('stats.json')); print(d['whitelist']['total'])")
          echo "BLOCK_COUNT=$RULES" >> "$GITHUB_ENV"
          echo "WHITE_COUNT=$WL" >> "$GITHUB_ENV"

      - name: 📤 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true

      - name: 💬 Commit stats update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 Stats: ${BLOCK_COUNT} block / ${WHITE_COUNT} whitelist rules"
          git push origin main 2>/dev/null || true
