# ============================================================
# 🛡️ AdGuard Home Rules Merger - Sources Configuration
# ============================================================
# 所有源均为 DNS 级有效（||domain^ 格式），浏览器级规则已排除
# merge.py 输出两个版本：标准版 + 完整版
# ============================================================

# ─── 标准版源 (约16万域名，适合大多数 AG Home) ───
blocklist:
  - name: GOODBYEADS-DNS
    url: https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/dns.txt
    desc: DNS专用去广告(中文优先) 🚫

  - name: Hagezi-Light
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/light.txt
    desc: 广告+追踪 DNS级精简 🌍

  - name: Hagezi-DOH
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/doh.txt
    desc: DNS-over-HTTP绕过拦截 🔒

  - name: Hagezi-Fake
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/fake.txt
    desc: 仿冒/钓鱼域名 🎭

# ─── 完整版额外源 (再加约20万域名) ───
blocklist_extra:
  - name: Hagezi-ProPlus
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.plus.txt
    desc: 广告+追踪+挖矿+诈骗+仿冒 全覆盖 🌍

  - name: 217heidai-DNS
    url: https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockdns.txt
    desc: 中文DNS合并规则(内含Anti-Ad精华) ⚡

